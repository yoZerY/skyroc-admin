packages:
  - 'apps/*'
  - 'packages/*'
  - 'packages/@core/*'
  - 'packages/shared/*'
  - 'packages/web/*'
  - 'packages/web/ui/*'
  - 'packages/native/*'
  - 'packages/native/ui/*'
  - 'packages/primitives/*'
  # 预留:小程序端按 web/native 同样的"平台优先"布局展开
  - 'packages/miniapp/*'
  - 'packages/miniapp/ui/*'
  - 'internal/*'

strictPeerDependencies: false
ignoreWorkspaceRootCheck: true

overrides:
  # 确保类型一致性
  '@types/react': ^19.2.7
  '@types/react-dom': ^19.2.3
  typescript: ^5.9.3

catalogs:
  # ==================== 核心基础依赖 ====================
  core:
    # React 生态核心
    react: 19.1.0
    react-dom: 19.1.0
    'react-error-boundary': 6.0.0

    # TypeScript 和构建工具
    typescript: ^5.9.3
    vite: ^7.2.7

    # 状态管理
    jotai: ^2.16.0
    '@tanstack/react-query': ^5.90.12

  # ==================== 开发工具 ====================
  dev:
    # 类型定义
    '@types/node': ^24.10.2
    '@types/react': ^19.2.7
    '@types/react-dom': ^19.2.3
    '@types/crypto-js': ^4.2.2
    '@types/nprogress': ^0.2.3
    '@types/qs': ^6.14.0

    # 构建和打包工具
    tsdown: ^0.18.2
    tsx: ^4.21.0
    turbo: ^2.7.1
    rimraf: ^6.0.1

    # 代码质量工具
    eslint: ^9.39.2
    '@soybeanjs/eslint-config': ^1.7.4
    oxlint: ^1.60.0

    # 测试工具
    vitest: ^4.0.18
    '@vitest/coverage-v8': ^4.0.18
    jsdom: ^28.0.0
    happy-dom: 20.6.1
    '@testing-library/react': ^16.3.2
    '@testing-library/jest-dom': ^6.9.1
    msw: ^2.7.0

    # ESLint 插件
    'eslint-plugin-react': ^7.37.5
    'eslint-plugin-react-hooks': ^7.0.1
    'eslint-plugin-react-refresh': ^0.4.24
    'eslint-plugin-sort': ^4.0.0

    # UnoCSS 相关
    '@unocss/core': ^66.5.10
    '@unocss/eslint-config': ^66.5.10
    '@unocss/preset-icons': ^66.5.10
    '@unocss/preset-mini': ^66.5.10
    '@unocss/preset-uno': ^66.5.10
    '@unocss/preset-wind3': ^66.5.10
    '@unocss/transformer-directives': ^66.5.10
    '@unocss/transformer-variant-group': ^66.5.10

    # Vite 插件
    'vite-plugin-inspect': ^11.3.3
    'vite-plugin-remove-console': ^2.2.0
    'vite-plugin-svg-icons': ^2.0.1

    # 其他开发工具
    'babel-plugin-react-compiler': ^1.0.0
    'unplugin-auto-import': ^20.3.0
    'unplugin-icons': ^22.5.0
    typed-css-modules: ^0.9.1

    # 工程化工具
    # Git 工具
    'simple-git-hooks': ^2.13.1
    '@soybeanjs/changelog': ^0.3.24
    # 包管理工具
    bumpp: ^10.0.3
    'npm-check-updates': ^17.1.14
    # 配置和执行工具
    c12: ^2.0.4
    cac: ^6.7.14
    enquirer: ^2.4.1
    execa: ^9.5.2
    # 终端美化工具
    boxen: ^8.0.1
    'gradient-string': ^3.0.0
    kolorist: ^1.8.0
    # 文件处理工具
    'fast-glob': ^3.3.3
    picomatch: ^4.0.3

  # ==================== Web 前端专用 ====================
  web:
    # React Web 专用
    '@vitejs/plugin-react': ^5.1.2
    '@tanstack/react-router': ^1.140.0
    '@tanstack/router-plugin': ^1.140.0

    # UI 组件库
    antd: ^6.1.0

    # 样式工具
    '@unocss/vite': ^66.5.10
    sass: ^1.96.0

    # 数据可视化
    echarts: ^6.0.0

    # 滚动库
    '@better-scroll/core': ^2.5.1

    # SVG 工具
    '@svgr/core': ^8.1.0
    '@svgr/plugin-jsx': ^8.1.0

    # 开发者工具
    'jotai-devtools': ^0.13.0
    '@tanstack/react-query-devtools': ^5.91.1
    '@tanstack/react-devtools': ^0.8.4
    '@tanstack/devtools-vite': ^0.3.12
    '@tanstack/react-router-devtools': ^1.140.0

  # ==================== 共享工具库 ====================
  utils:
    # 通用工具
    dayjs: ^1.11.19
    date-fns: ^4.1.0
    nanoid: ^5.0.9
    clsx: ^2.1.1
    colord: ^2.9.3
    klona: ^2.0.6
    'crypto-js': ^4.2.0
    localforage: ^1.10.0
    'tailwind-merge': ^3.4.0
    'tailwind-variants': ^3.2.2
    defu: ^6.1.4
    ahooks: ^3.9.6
    zod: ^4.1.13

    # 网络请求
    axios: ^1.7.9
    'axios-retry': ^4.5.0
    qs: ^6.14.0

  # ==================== UI 组件共享 ====================
  ui-shared:
    # Radix UI
    '@radix-ui/react-scroll-area': 1.2.10
    '@radix-ui/react-slot': 1.2.3
    '@radix-ui/react-tooltip': 1.2.7
    # 动画
    motion: ^12.23.26

    # 图标
    '@iconify/react': ^6.0.2
    '@iconify/json': ^2.2.416
    '@iconify/types': ^2.0.0

    # 其他 UI 工具
    nprogress: ^0.2.0

  # ==================== 国际化 ====================
  i18n:
    i18next: 25.7.2
    react-i18next: 16.4.0

  # ==================== React Native ====================
  native:
    # Expo 生态
    expo: ~54.0.33
    expo-constants: ~18.0.13
    expo-dev-client: ~6.0.20
    expo-font: ~14.0.11
    expo-haptics: ~15.0.8
    expo-image: ~3.0.11
    expo-linking: ~8.0.11
    expo-router: ~6.0.23
    expo-splash-screen: ~31.0.13
    expo-status-bar: ~3.0.9
    expo-symbols: ~1.0.8
    expo-system-ui: ~6.0.9
    expo-web-browser: ~15.0.10

    # React Native 核心
    react-native: 0.81.5
    react-native-css: ^3.0.1
    react-native-gesture-handler: ~2.28.0
    react-native-reanimated: ~4.1.1
    react-native-safe-area-context: ~5.6.0
    react-native-screens: ~4.16.0
    react-native-web: ~0.21.0
    react-native-worklets: 0.5.1

    # 样式
    nativewind: 5.0.0-preview.2

    # 导航
    '@react-navigation/bottom-tabs': ^7.4.0
    '@react-navigation/elements': ^2.6.3
    '@react-navigation/native': ^7.1.8

    # 图标
    '@expo/vector-icons': ^15.0.3

    # 底部面板
    '@gorhom/bottom-sheet': ^5.1.2

    # 页面滑动
    react-native-pager-view: 8.0.0

    # 验证码输入
    react-native-confirmation-code-field: ^8.0.1

    # Skia 图形引擎
    '@shopify/react-native-skia': 2.2.12

    # 弹出层
    react-native-modal: 14.0.0-rc.1

    # 开发工具
    '@dev-plugins/react-navigation': ^0.4.0
    eslint-config-expo: ~10.0.0

    # 测试
    '@testing-library/react-native': ^13.0.0

  # ==================== CSS / PostCSS ====================
  css:
    tailwindcss: ^4.1.18
    '@tailwindcss/cli': ^4.1.18
    '@tailwindcss/postcss': ^4.1.13
    postcss: ^8.5.6

  # ==================== peer 依赖管理 ====================
  peer:
    react: 19.2.1
    react-dom: 19.2.1
